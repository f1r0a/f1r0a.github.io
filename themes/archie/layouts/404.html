<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404</title>

<style>
*{
    transition: all 0.6s;
}

html {
    height: 100%;
}

body{
    font-family: 'Lato', sans-serif;
    color: #888;
    margin: 0;
    background: #f8fafc;
}

#main{
    display: table;
    width: 100%;
    height: 100vh;
    text-align: center;
}

.fof{
    display: table-cell;
    vertical-align: middle;
}

.fof h1{
    font-size: 50px;
    display: inline-block;
    padding-right: 12px;
    animation: type .5s alternate infinite;
}

.fof p{
    margin-top: 10px;
    font-size: 16px;
}

.fof a{
    display: inline-block;
    margin-top: 20px;
    text-decoration: none;
    color: #555;
    border: 1px solid #ddd;
    padding: 8px 16px;
    border-radius: 5px;
}

.fof a:hover{
    background: #eee;
    color: #000;
}

@keyframes type{
    from{box-shadow: inset -3px 0px 0px #888;}
    to{box-shadow: inset -3px 0px 0px transparent;}
}
</style>
</head>

<body>

<div id="main">
    <div class="fof">
        <h1>Error 404</h1>
        <p>Sorry, the page you are looking for does not exist.</p>
        <a href="/">Go Back Home</a>
    </div>
</div>

</body>
</html>
